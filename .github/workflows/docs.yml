name: Docs

on:
  pull_request:
    paths:
      - 'www/**'
      - '*.md'
  push:
    branches:
      - master

jobs:
  build:
    name: Build Docs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install Task
        uses: go-task/setup-task@v2
      - name: Build site
        run: task docs